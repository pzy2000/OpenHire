<svg xmlns="http://www.w3.org/2000/svg" width="660" height="116" viewBox="0 0 660 116" role="img" aria-labelledby="title desc">
  <title id="title">OpenHire 中文终端命令</title>
  <desc id="desc">终端卡片展示 openhire onboard 和 openhire gateway，并带有闪烁光标。</desc>
  <defs>
    <linearGradient id="terminalBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#252733"/>
      <stop offset="55%" stop-color="#1f2330"/>
      <stop offset="100%" stop-color="#151929"/>
    </linearGradient>
    <filter id="terminalShadow" x="-10%" y="-25%" width="120%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity=".18"/>
    </filter>
  </defs>
  <style>
    @keyframes blink { 0%, 48% { opacity: 1; } 49%, 100% { opacity: .08; } }
    .cursor { animation: blink 1.05s steps(1) infinite; }
  </style>
  <rect x="10" y="8" width="640" height="100" rx="14" fill="url(#terminalBg)" filter="url(#terminalShadow)"/>
  <circle cx="34" cy="30" r="7" fill="#ff5f56"/>
  <circle cx="58" cy="30" r="7" fill="#ffbd2e"/>
  <circle cx="82" cy="30" r="7" fill="#27c93f"/>
  <g font-family="'SF Mono','Fira Code','Cascadia Code',Consolas,monospace" font-size="18" font-weight="600">
    <text x="34" y="64" fill="#a7f3d0">$</text>
    <text x="60" y="64" fill="#93c5fd">openhire</text>
    <text x="160" y="64" fill="#e5e7eb">onboard</text>
    <text x="258" y="64" fill="#fb7185">&amp;&amp;</text>
    <text x="322" y="64" fill="#93c5fd">openhire</text>
    <text x="424" y="64" fill="#e5e7eb">gateway</text>
  </g>
  <text x="34" y="90" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif" font-size="14" font-weight="700" fill="#a5b4fc">初始化配置 · 启动 Gateway / Admin 控制台</text>
  <rect class="cursor" x="548" y="49" width="10" height="21" rx="2" fill="#86efac"/>
</svg>
