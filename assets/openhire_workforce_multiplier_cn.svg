<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" role="img" aria-labelledby="title desc">
  <title id="title">OpenHire 数字员工倍增器</title>
  <desc id="desc">流程图展示一个业务目标被路由给多位数字员工，并收敛成可审计决策包。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-20%" width="136%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#0f766e"/>
    </marker>
  </defs>
  <style>
    @keyframes dash { to { stroke-dashoffset: -32; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    @keyframes pulse { 0%,100% { opacity: .78; } 50% { opacity: 1; } }
    .flow { stroke-dasharray: 11 9; animation: dash 1.9s linear infinite; }
    .employee { animation: float 3s ease-in-out infinite; transform-origin: center; }
    .pulse { animation: pulse 2.3s ease-in-out infinite; }
    .label { font-family: 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',Inter,sans-serif; }
  </style>
  <rect width="960" height="600" rx="22" fill="url(#bg)"/>
  <rect x="1" y="1" width="958" height="598" rx="22" fill="none" stroke="#c7d2fe" stroke-width="2"/>
  <text class="label" x="480" y="48" text-anchor="middle" font-size="18" font-weight="800" letter-spacing="5" fill="#4338ca">数字员工倍增器</text>
  <text class="label" x="480" y="84" text-anchor="middle" font-size="30" font-weight="900" fill="#0f172a">一个目标，拆成多路专家并行工作</text>

  <rect x="54" y="236" width="190" height="112" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.6" filter="url(#shadow)"/>
  <text class="label" x="149" y="266" text-anchor="middle" font-size="14" font-weight="800" fill="#64748b">CEO / 管理员目标</text>
  <text class="label" x="149" y="296" text-anchor="middle" font-size="22" font-weight="900" fill="#111827">营收增长 20%</text>
  <text class="label" x="149" y="323" text-anchor="middle" font-size="15" fill="#475569">同时控制回款风险</text>

  <path class="flow" d="M244 292 H344" stroke="#2563eb" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <g class="pulse">
    <circle cx="440" cy="292" r="72" fill="url(#hub)" filter="url(#shadow)"/>
    <circle cx="440" cy="292" r="50" fill="none" stroke="#bfdbfe" stroke-width="2" stroke-dasharray="6 7"/>
    <text class="label" x="440" y="282" text-anchor="middle" font-size="17" font-weight="900" fill="#ffffff">OpenHire</text>
    <text class="label" x="440" y="306" text-anchor="middle" font-size="15" font-weight="700" fill="#dbeafe">主控 agent</text>
  </g>

  <path class="flow" d="M482 235 C540 166 596 130 662 122" stroke="#2563eb" stroke-width="3.5" fill="none" marker-end="url(#arrow)"/>
  <path class="flow" d="M509 270 C564 234 613 217 676 216" stroke="#2563eb" stroke-width="3.5" fill="none" marker-end="url(#arrow)"/>
  <path class="flow" d="M512 315 C570 344 622 356 682 352" stroke="#2563eb" stroke-width="3.5" fill="none" marker-end="url(#arrow)"/>
  <path class="flow" d="M482 350 C541 420 596 458 662 466" stroke="#2563eb" stroke-width="3.5" fill="none" marker-end="url(#arrow)"/>

  <g class="employee">
    <rect x="668" y="86" width="214" height="70" rx="15" fill="#ffffff" stroke="#93c5fd" stroke-width="1.6" filter="url(#shadow)"/>
    <text class="label" x="775" y="115" text-anchor="middle" font-size="17" font-weight="900" fill="#1d4ed8">市场洞察官</text>
    <text class="label" x="775" y="137" text-anchor="middle" font-size="13" fill="#475569">行业信号、竞品、客群</text>
  </g>
  <g class="employee" style="animation-delay:.2s">
    <rect x="692" y="181" width="214" height="70" rx="15" fill="#ffffff" stroke="#93c5fd" stroke-width="1.6" filter="url(#shadow)"/>
    <text class="label" x="799" y="210" text-anchor="middle" font-size="17" font-weight="900" fill="#1d4ed8">销售运营官</text>
    <text class="label" x="799" y="232" text-anchor="middle" font-size="13" fill="#475569">pipeline 与转化动作</text>
  </g>
  <g class="employee" style="animation-delay:.4s">
    <rect x="700" y="276" width="214" height="70" rx="15" fill="#ffffff" stroke="#93c5fd" stroke-width="1.6" filter="url(#shadow)"/>
    <text class="label" x="807" y="305" text-anchor="middle" font-size="17" font-weight="900" fill="#1d4ed8">财务风控官</text>
    <text class="label" x="807" y="327" text-anchor="middle" font-size="13" fill="#475569">预测、现金流、回款</text>
  </g>
  <g class="employee" style="animation-delay:.6s">
    <rect x="668" y="430" width="214" height="70" rx="15" fill="#ffffff" stroke="#93c5fd" stroke-width="1.6" filter="url(#shadow)"/>
    <text class="label" x="775" y="459" text-anchor="middle" font-size="17" font-weight="900" fill="#1d4ed8">法务 + PMO</text>
    <text class="label" x="775" y="481" text-anchor="middle" font-size="13" fill="#475569">边界、负责人、节奏</text>
  </g>

  <path class="flow" d="M702 156 C634 246 619 340 694 430" stroke="#0f766e" stroke-width="4" fill="none" marker-end="url(#arrowTeal)"/>
  <path class="flow" d="M701 346 C632 383 570 392 516 343" stroke="#0f766e" stroke-width="4" fill="none" marker-end="url(#arrowTeal)"/>
  <text class="label" x="601" y="396" font-size="14" font-weight="800" fill="#0f766e">交叉校验假设</text>

  <path class="flow" d="M440 364 C437 424 386 456 324 476" stroke="#0f766e" stroke-width="4" fill="none" marker-end="url(#arrowTeal)"/>
  <rect x="64" y="424" width="270" height="100" rx="18" fill="#ecfdf5" stroke="#99f6e4" stroke-width="1.8" filter="url(#shadow)"/>
  <text class="label" x="199" y="455" text-anchor="middle" font-size="15" font-weight="900" fill="#0f766e">可审计决策包</text>
  <text class="label" x="199" y="486" text-anchor="middle" font-size="15" fill="#115e59">CEO 简报 · 30/60/90 计划</text>
  <text class="label" x="199" y="510" text-anchor="middle" font-size="15" fill="#115e59">风险清单 · 负责人 · 日志</text>

  <rect x="290" y="540" width="380" height="36" rx="18" fill="#dbeafe" stroke="#93c5fd"/>
  <text class="label" x="480" y="563" text-anchor="middle" font-size="15" font-weight="800" fill="#1d4ed8">按角色扩容 · 并行推进 · 责任到人 · 全程可审计</text>
</svg>
